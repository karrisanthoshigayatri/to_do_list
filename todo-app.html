<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow — Todo App</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
/* ── Reset & Variables ─────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#eef1ff;
  --bg2:#e4e8ff;
  --surface:#ffffff;
  --surface2:#f4f6ff;
  --border:rgba(99,102,241,.14);
  --text:#1a1740;
  --text2:#6b7280;
  --accent:#6366f1;
  --accent2:#8b5cf6;
  --shadow:0 4px 24px rgba(99,102,241,.09);
  --shadow-lg:0 14px 48px rgba(99,102,241,.16);
  --r:16px;--rs:10px;
  --t:.22s cubic-bezier(.4,0,.2,1);
  --font-d:'Syne',sans-serif;
  --font-b:'DM Sans',sans-serif;
}
[data-theme="dark"]{
  --bg:#0c0c1d;--bg2:#111127;
  --surface:#13132a;--surface2:#1c1c36;
  --border:rgba(139,92,246,.2);
  --text:#e8e6f5;--text2:#7c7c9a;
  --shadow:0 4px 24px rgba(0,0,0,.5);
  --shadow-lg:0 14px 48px rgba(0,0,0,.6);
}

html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--t),color var(--t);overflow-x:hidden}

/* ── Mesh BG ───────────────────────────────────────────── */
body::before,body::after{content:'';position:fixed;pointer-events:none;z-index:0;border-radius:50%}
body::before{top:-25vh;right:-18vw;width:65vw;height:65vw;background:radial-gradient(circle,rgba(99,102,241,.13) 0%,transparent 70%)}
body::after{bottom:-18vh;left:-14vw;width:55vw;height:55vw;background:radial-gradient(circle,rgba(139,92,246,.11) 0%,transparent 70%)}

.wrap{max-width:800px;margin:0 auto;padding:0 18px 100px;position:relative;z-index:1}

/* ── Header ────────────────────────────────────────────── */
header{display:flex;align-items:center;justify-content:space-between;padding:38px 0 26px}
.logo{font-family:var(--font-d);font-size:clamp(1.7rem,4vw,2.3rem);font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:.8rem;color:var(--text2);font-weight:300;margin-top:2px}

/* Dark Toggle */
.toggle{width:50px;height:28px;background:var(--border);border:2px solid var(--border);border-radius:999px;cursor:pointer;position:relative;transition:background var(--t);flex-shrink:0;outline:none}
.toggle.on{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent}
.toggle-thumb{position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform var(--t);box-shadow:0 2px 6px rgba(0,0,0,.25)}
.toggle.on .toggle-thumb{transform:translateX(22px)}
.toggle-icon{position:absolute;top:50%;transform:translateY(-50%);font-size:.7rem;pointer-events:none}
.toggle-icon.sun{left:6px}
.toggle-icon.moon{right:5px}

/* ── Stats ─────────────────────────────────────────────── */
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:6px 18px;font-size:.78rem;color:var(--text2);font-weight:500;box-shadow:var(--shadow)}
.stat b{color:var(--accent);font-weight:700}

/* ── Panel ─────────────────────────────────────────────── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;box-shadow:var(--shadow);margin-bottom:22px;transition:background var(--t),border-color var(--t)}

/* ── Form ──────────────────────────────────────────────── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:520px){.form-grid{grid-template-columns:1fr}}
.span2{grid-column:1/-1}

.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:.72rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}
.field input,.field textarea,.field select{
  background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);
  padding:10px 14px;font-family:var(--font-b);font-size:.9rem;color:var(--text);
  outline:none;transition:border-color var(--t),box-shadow var(--t);width:100%;resize:none;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.13)}
.field textarea{min-height:68px}
.field select option{background:var(--surface);color:var(--text)}

/* ── Add Button ────────────────────────────────────────── */
.btn-add{
  width:100%;margin-top:4px;padding:13px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border:none;border-radius:var(--rs);cursor:pointer;
  font-family:var(--font-d);font-size:.95rem;font-weight:700;letter-spacing:.01em;
  box-shadow:0 4px 18px rgba(99,102,241,.38);
  transition:transform var(--t),box-shadow var(--t);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-add:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(99,102,241,.48)}
.btn-add:active{transform:scale(.97)}

/* ── Filter Bar ────────────────────────────────────────── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-btn{
  padding:7px 20px;border-radius:999px;border:1.5px solid var(--border);
  background:var(--surface);color:var(--text2);font-size:.8rem;font-weight:700;
  cursor:pointer;transition:all var(--t);font-family:var(--font-d);
}
.filter-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.32)}
.filter-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);transform:translateY(-1px)}

/* ── Task List ─────────────────────────────────────────── */
#task-list{display:flex;flex-direction:column;gap:12px;min-height:40px}

.empty{text-align:center;padding:64px 20px;color:var(--text2)}
.empty span{font-size:3rem;display:block;margin-bottom:12px}
.empty p{font-size:.9rem}

/* ── Task Card ─────────────────────────────────────────── */
.card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);
  padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden;
  transition:box-shadow var(--t),transform var(--t),opacity .28s ease,max-height .28s ease;
  display:flex;flex-direction:column;gap:10px;
}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.card-bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:3px 0 0 3px}

.card-top{display:flex;align-items:flex-start;gap:12px}
.cb{
  width:22px;height:22px;border-radius:7px;border:2px solid var(--border);
  background:var(--surface2);cursor:pointer;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--t);position:relative;
}
.cb.done{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent}
.cb.done::after{content:'✓';color:#fff;font-size:.72rem;font-weight:900}

.card-body{flex:1;min-width:0}
.card-title{font-family:var(--font-d);font-size:.98rem;font-weight:700;color:var(--text);line-height:1.35;transition:all var(--t)}
.card-title.done{text-decoration:line-through;color:var(--text2)}
.card-desc{font-size:.82rem;color:var(--text2);margin-top:3px;line-height:1.55;word-break:break-word}

.card-actions{display:flex;gap:6px;flex-shrink:0}
.btn-icon{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 9px;cursor:pointer;font-size:.85rem;color:var(--text2);transition:all var(--t);line-height:1}
.btn-icon:hover{border-color:var(--accent);color:var(--accent);transform:scale(1.12)}
.btn-icon.del:hover{border-color:#ef4444;color:#ef4444}

.card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:.7rem;font-weight:700;padding:3px 12px;border-radius:999px;font-family:var(--font-d);letter-spacing:.04em}
.date-tag{font-size:.75rem;color:var(--text2);display:flex;align-items:center;gap:4px}
.date-tag.overdue{color:#ef4444}

/* ── Modal ─────────────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.48);
  backdrop-filter:blur(7px);z-index:100;
  display:none;align-items:center;justify-content:center;padding:20px;
}
.overlay.open{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:28px;width:100%;max-width:500px;
  box-shadow:var(--shadow-lg);
}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-family:var(--font-d);font-size:1.2rem;font-weight:800}
.close-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text2);padding:4px 8px;border-radius:6px;transition:color var(--t)}
.close-btn:hover{color:var(--text)}
.modal-form{display:flex;flex-direction:column;gap:14px}
.modal-actions{display:flex;gap:10px;margin-top:4px}
.btn-cancel{flex:1;padding:11px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text2);font-weight:700;font-family:var(--font-d);cursor:pointer;font-size:.9rem;transition:all var(--t)}
.btn-cancel:hover{border-color:var(--accent);color:var(--accent)}
.btn-save{flex:2;padding:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:var(--rs);font-weight:700;font-family:var(--font-d);cursor:pointer;font-size:.9rem;box-shadow:0 4px 14px rgba(99,102,241,.35);transition:all var(--t)}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 7px 22px rgba(99,102,241,.45)}

/* ── Toasts ────────────────────────────────────────────── */
#toast-box{position:fixed;bottom:26px;right:26px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);
  padding:12px 18px;font-size:.84rem;font-weight:500;box-shadow:var(--shadow-lg);
  display:flex;align-items:center;gap:9px;max-width:290px;pointer-events:all;
  animation:toastIn .32s cubic-bezier(.34,1.56,.64,1) both;
}
.toast.bye{animation:toastOut .22s ease-in forwards}
@keyframes toastIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastOut{to{transform:translateX(110%);opacity:0}}

/* ── Animations ────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .5s ease both}
.d1{animation-delay:.08s}.d2{animation-delay:.16s}.d3{animation-delay:.24s}

@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.card-in{animation:cardIn .36s cubic-bezier(.34,1.26,.64,1) both}

@keyframes cardOut{to{opacity:0;transform:translateX(-28px) scale(.95);max-height:0!important;padding-top:0!important;padding-bottom:0!important;margin-bottom:0!important;border-width:0!important}}
.card-out{animation:cardOut .28s ease-in forwards}

@keyframes modalIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.overlay.open .modal{animation:modalIn .3s cubic-bezier(.34,1.3,.64,1) both}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
.overlay.open{animation:overlayIn .22s ease both}
</style>
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <header class="fu">
    <div>
      <div class="logo">✦ TaskFlow</div>
      <div class="logo-sub">Stay focused. Stay organized.</div>
    </div>
    <button class="toggle" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
      <div class="toggle-thumb"></div>
      <span class="toggle-icon sun">☀️</span>
      <span class="toggle-icon moon">🌙</span>
    </button>
  </header>

  <!-- Stats -->
  <div class="stats fu d1" id="stats">
    <div class="stat">Total <b id="s-total">0</b></div>
    <div class="stat">Completed <b id="s-done">0</b></div>
    <div class="stat">Pending <b id="s-pending">0</b></div>
    <div class="stat" id="s-urgent-wrap" style="display:none">🔴 Urgent <b id="s-urgent">0</b></div>
  </div>

  <!-- Add Task Form -->
  <div class="panel fu d2">
    <div class="form-grid">
      <div class="field span2">
        <label>Task Title *</label>
        <input id="f-title" type="text" placeholder="What needs to be done?"/>
      </div>
      <div class="field span2">
        <label>Description</label>
        <textarea id="f-desc" placeholder="Optional details…"></textarea>
      </div>
      <div class="field">
        <label>Due Date</label>
        <input id="f-date" type="date"/>
      </div>
      <div class="field">
        <label>Priority</label>
        <select id="f-priority">
          <option value="high">🔴 High</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
      <div class="span2">
        <button class="btn-add" id="addBtn">
          <span style="font-size:1.1rem">＋</span> Add Task
        </button>
      </div>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar fu d3" id="filterBar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
    <button class="filter-btn" data-filter="high">🔴 High Priority</button>
  </div>

  <!-- Task List -->
  <div id="task-list"></div>
</div>

<!-- Edit Modal -->
<div class="overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-heading">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="modal-heading">Edit Task ✏️</span>
      <button class="close-btn" id="modalClose" aria-label="Close">✕</button>
    </div>
    <div class="modal-form">
      <div class="field">
        <label>Title</label>
        <input id="m-title" type="text"/>
      </div>
      <div class="field">
        <label>Description</label>
        <textarea id="m-desc"></textarea>
      </div>
      <div class="field">
        <label>Due Date</label>
        <input id="m-date" type="date"/>
      </div>
      <div class="field">
        <label>Priority</label>
        <select id="m-priority">
          <option value="high">🔴 High</option>
          <option value="medium">🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="modalCancel">Cancel</button>
        <button class="btn-save" id="modalSave">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-box"></div>

<script>
// ── State ─────────────────────────────────────────────────────
const state = {
  tasks: [],
  filter: 'all',
  editId: null,
  dark: false,
};

const PRIORITY = {
  high:   { label:'High',   emoji:'🔴', order:0, accent:'#ef4444', soft:'rgba(239,68,68,.13)'  },
  medium: { label:'Medium', emoji:'🟡', order:1, accent:'#f59e0b', soft:'rgba(245,158,11,.13)' },
  low:    { label:'Low',    emoji:'🟢', order:2, accent:'#22c55e', soft:'rgba(34,197,94,.13)'  },
};

const uid = () => Math.random().toString(36).slice(2,9);

// ── DOM refs ──────────────────────────────────────────────────
const $list   = document.getElementById('task-list');
const $modal  = document.getElementById('modal');
const $toggle = document.getElementById('themeToggle');

// ── Toast ─────────────────────────────────────────────────────
function toast(msg, type='success'){
  const icons = { success:'✅', error:'🗑️', warn:'⚠️', info:'ℹ️' };
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span>${icons[type]||'✅'}</span><span>${msg}</span>`;
  document.getElementById('toast-box').appendChild(el);
  setTimeout(()=>{ el.classList.add('bye'); setTimeout(()=>el.remove(), 250); }, 2800);
}

// ── Theme ─────────────────────────────────────────────────────
$toggle.addEventListener('click', ()=>{
  state.dark = !state.dark;
  document.documentElement.setAttribute('data-theme', state.dark?'dark':'light');
  $toggle.classList.toggle('on', state.dark);
});

// ── Filter ────────────────────────────────────────────────────
document.getElementById('filterBar').addEventListener('click', e=>{
  const btn = e.target.closest('.filter-btn');
  if(!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  state.filter = btn.dataset.filter;
  render();
});

// ── Add Task ──────────────────────────────────────────────────
document.getElementById('addBtn').addEventListener('click', addTask);
document.getElementById('f-title').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(); });

function addTask(){
  const title = document.getElementById('f-title').value.trim();
  if(!title){ toast('Please enter a task title 📝','warn'); return; }
  const task = {
    id: uid(),
    title,
    desc:     document.getElementById('f-desc').value.trim(),
    date:     document.getElementById('f-date').value,
    priority: document.getElementById('f-priority').value,
    done:     false,
    createdAt: Date.now(),
  };
  state.tasks.unshift(task);
  document.getElementById('f-title').value   = '';
  document.getElementById('f-desc').value    = '';
  document.getElementById('f-date').value    = '';
  document.getElementById('f-priority').value = 'medium';
  toast('Task added! ✨');
  render();
}

// ── Render ────────────────────────────────────────────────────
function render(){
  updateStats();

  // Sort by priority, then filter
  const sorted = [...state.tasks].sort((a,b)=> PRIORITY[a.priority].order - PRIORITY[b.priority].order);
  const filtered = sorted.filter(t=>{
    if(state.filter==='completed') return t.done;
    if(state.filter==='pending')   return !t.done;
    if(state.filter==='high')      return t.priority==='high';
    return true;
  });

  if(filtered.length===0){
    $list.innerHTML = `<div class="empty"><span>🌿</span><p>No tasks here. Add one above!</p></div>`;
    return;
  }

  // Only re-render cards that don't already exist in the DOM
  const existingIds = new Set([...$list.querySelectorAll('.card')].map(c=>c.dataset.id));
  const newIds = new Set(filtered.map(t=>t.id));

  // Remove cards not in filtered set
  $list.querySelectorAll('.card').forEach(card=>{
    if(!newIds.has(card.dataset.id)){
      card.classList.add('card-out');
      setTimeout(()=>card.remove(), 290);
    }
  });

  // Remove empty state if present
  const empty = $list.querySelector('.empty');
  if(empty) empty.remove();

  // Add/update cards
  filtered.forEach((task, i)=>{
    const existing = $list.querySelector(`.card[data-id="${task.id}"]`);
    if(existing){
      // Update in place (title, desc, meta)
      updateCardDOM(existing, task);
    } else {
      const el = buildCard(task);
      // Insert at correct position
      const all = [...$list.querySelectorAll('.card')];
      if(all.length===0 || i >= all.length){
        $list.appendChild(el);
      } else {
        $list.insertBefore(el, all[i]);
      }
    }
  });
}

function buildCard(task){
  const cfg = PRIORITY[task.priority];
  const today = new Date().toDateString();
  const overdue = task.date && !task.done && new Date(task.date) < new Date(today);

  const el = document.createElement('div');
  el.className = 'card card-in';
  el.dataset.id = task.id;
  el.style.borderColor = cfg.accent+'33';
  el.innerHTML = cardHTML(task, cfg, overdue);
  attachCardEvents(el, task.id);
  return el;
}

function cardHTML(task, cfg, overdue){
  return `
    <div class="card-bar" style="background:${cfg.accent}"></div>
    <div class="card-top">
      <div class="cb${task.done?' done':''}" data-role="cb" title="Toggle complete"></div>
      <div class="card-body">
        <div class="card-title${task.done?' done':''}" data-role="title">${escHtml(task.title)}</div>
        ${task.desc ? `<div class="card-desc" data-role="desc">${escHtml(task.desc)}</div>` : ''}
      </div>
      <div class="card-actions">
        <button class="btn-icon" data-role="edit" title="Edit task">✏️</button>
        <button class="btn-icon del" data-role="del" title="Delete task">🗑️</button>
      </div>
    </div>
    <div class="card-meta">
      <span class="badge" style="background:${cfg.soft};color:${cfg.accent}" data-role="badge">${cfg.emoji} ${cfg.label}</span>
      ${task.date ? `<span class="date-tag${overdue?' overdue':''}" data-role="date">📅 ${overdue?'Overdue · ':''}${task.date}</span>` : ''}
      ${task.done ? `<span class="date-tag">✅ Done</span>` : ''}
    </div>`;
}

function updateCardDOM(el, task){
  const cfg = PRIORITY[task.priority];
  const today = new Date().toDateString();
  const overdue = task.date && !task.done && new Date(task.date) < new Date(today);

  el.style.borderColor = cfg.accent+'33';
  el.querySelector('.card-bar').style.background = cfg.accent;
  const cb = el.querySelector('[data-role="cb"]');
  cb.className = 'cb'+(task.done?' done':'');
  const t = el.querySelector('[data-role="title"]');
  t.textContent = task.title;
  t.className = 'card-title'+(task.done?' done':'');
  const d = el.querySelector('[data-role="desc"]');
  if(task.desc){ if(d){ d.textContent=task.desc; } else { t.insertAdjacentHTML('afterend',`<div class="card-desc" data-role="desc">${escHtml(task.desc)}</div>`); } }
  else if(d) d.remove();
  const badge = el.querySelector('[data-role="badge"]');
  if(badge){ badge.style.background=cfg.soft; badge.style.color=cfg.accent; badge.textContent=`${cfg.emoji} ${cfg.label}`; }
  const dateEl = el.querySelector('[data-role="date"]');
  const meta = el.querySelector('.card-meta');
  // Rebuild meta for simplicity
  meta.innerHTML = `
    <span class="badge" style="background:${cfg.soft};color:${cfg.accent}" data-role="badge">${cfg.emoji} ${cfg.label}</span>
    ${task.date ? `<span class="date-tag${overdue?' overdue':''}" data-role="date">📅 ${overdue?'Overdue · ':''}${task.date}</span>` : ''}
    ${task.done ? `<span class="date-tag">✅ Done</span>` : ''}`;
}

function attachCardEvents(el, id){
  el.addEventListener('click', e=>{
    const role = e.target.closest('[data-role]')?.dataset.role;
    if(role==='cb')   toggleTask(id);
    if(role==='edit') openEdit(id);
    if(role==='del')  deleteTask(el, id);
  });
}

// ── Toggle ────────────────────────────────────────────────────
function toggleTask(id){
  const task = state.tasks.find(t=>t.id===id);
  if(!task) return;
  task.done = !task.done;
  toast(task.done ? 'Task completed! 🎉' : 'Marked as pending ↩️');
  render();
}

// ── Delete ────────────────────────────────────────────────────
function deleteTask(el, id){
  el.classList.add('card-out');
  setTimeout(()=>{
    state.tasks = state.tasks.filter(t=>t.id!==id);
    toast('Task deleted 🗑️','error');
    render();
  }, 290);
}

// ── Edit Modal ────────────────────────────────────────────────
function openEdit(id){
  const task = state.tasks.find(t=>t.id===id);
  if(!task) return;
  state.editId = id;
  document.getElementById('m-title').value    = task.title;
  document.getElementById('m-desc').value     = task.desc;
  document.getElementById('m-date').value     = task.date;
  document.getElementById('m-priority').value = task.priority;
  $modal.classList.add('open');
  document.getElementById('m-title').focus();
}

function closeModal(){
  $modal.classList.remove('open');
  state.editId = null;
}

document.getElementById('modalClose').addEventListener('click',  closeModal);
document.getElementById('modalCancel').addEventListener('click', closeModal);
$modal.addEventListener('click', e=>{ if(e.target===$modal) closeModal(); });

document.getElementById('modalSave').addEventListener('click', ()=>{
  const title = document.getElementById('m-title').value.trim();
  if(!title){ toast('Title cannot be empty 📝','warn'); return; }
  const task = state.tasks.find(t=>t.id===state.editId);
  if(!task){ closeModal(); return; }
  task.title    = title;
  task.desc     = document.getElementById('m-desc').value.trim();
  task.date     = document.getElementById('m-date').value;
  task.priority = document.getElementById('m-priority').value;
  closeModal();
  toast('Task updated! ✏️','info');
  render();
});

// Escape key closes modal
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

// ── Stats ─────────────────────────────────────────────────────
function updateStats(){
  const total   = state.tasks.length;
  const done    = state.tasks.filter(t=>t.done).length;
  const pending = total - done;
  const urgent  = state.tasks.filter(t=>t.priority==='high'&&!t.done).length;
  document.getElementById('s-total').textContent   = total;
  document.getElementById('s-done').textContent    = done;
  document.getElementById('s-pending').textContent = pending;
  document.getElementById('s-urgent').textContent  = urgent;
  document.getElementById('s-urgent-wrap').style.display = urgent>0 ? '' : 'none';
}

// ── Helper ────────────────────────────────────────────────────
function escHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ── Init ──────────────────────────────────────────────────────
render();
</script>
</body>
